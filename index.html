<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Notificar Clip no Discord</title>
  <style>
    body {
      background-color: #bb90ff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #ffffff;
    }
    input, button {
      font-size: 16px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 8px;
    }
    input {
      width: 300px;
    }
    button {
      background-color: #ff8cd3;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>🎬 Notificar Novo Clipe</h2>
  <input type="text" id="clipUrl" placeholder="Cole o link do clipe aqui">
  <button onclick="sendToDiscord()">Enviar para o Discord</button>

  <script>
    function sendToDiscord() {
      const url = document.getElementById("clipUrl").value;
      if (!url) {
        alert("Por favor, cole o link do clipe.");
        return;
      }

      fetch("https://discord.com/api/webhooks/1391066978629718024/Cg5F4TvdeogbN74h2sswnOiqppuIlRP6jB0R4tKIDtdOXsPS88KHI7cFTl1wtRkWWa19", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: `🎬 Confiram esse clipe criado no canal da Ale na twitch: ${url} @everyone 💜`
        })
      })
      .then(response => {
        if (response.ok) {
          alert("Clip enviado com sucesso!");
          document.getElementById("clipUrl").value = "";
        } else {
          alert("Erro ao enviar para o Discord.");
        }
      })
      .catch(() => {
        alert("Erro de conexão.");
      });
    }
  </script>

</body>
</html>
